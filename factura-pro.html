<title>FacturaPro</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
:root {
  --text-xs:0.75rem;--text-sm:0.875rem;--text-base:1rem;--text-lg:1.15rem;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
  --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
  --r-sm:.375rem;--r-md:.5rem;--r-lg:.75rem;--r-xl:1rem;--r-full:9999px;
  --t:150ms cubic-bezier(.16,1,.3,1);
  --font:'Satoshi','Helvetica Neue',sans-serif;
}
[data-theme="light"]{
  --bg:#f7f6f2;--surface:#fff;--surface-2:#f9f8f5;
  --border:rgba(40,37,29,.12);--divider:#dcd9d5;
  --text:#28251d;--muted:#7a7974;--faint:#bab9b4;
  --p:#01696f;--ph:#0c4e54;--pa:#0f3638;--hl:#cedcd8;
  --err:#a12c7b;
  --sh-sm:0 1px 3px rgba(40,37,29,.07),0 1px 2px rgba(40,37,29,.04);
  --sh-md:0 4px 14px rgba(40,37,29,.09),0 2px 4px rgba(40,37,29,.05);
  --row-hover:#f0f7f6;--row-alt:#fafaf8;--focus-bg:#f0f7f6;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased}
body{min-height:100dvh;font-family:var(--font);font-size:var(--text-sm);color:var(--text);background:var(--bg);line-height:1.5}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input{font-family:inherit}
table{border-collapse:collapse;width:100%}

.app{max-width:1100px;margin:0 auto;padding:2rem 1.5rem}

.topbar{display:flex;align-items:center;margin-bottom:2rem}
.logo{display:flex;align-items:center;gap:.75rem}
.logo-icon{width:36px;height:36px;background:var(--p);border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.logo-text{font-size:1rem;font-weight:700;letter-spacing:-.01em}
.logo-text span{color:var(--p)}

.card{background:var(--surface);border-radius:var(--r-xl);box-shadow:var(--sh-md);border:1px solid var(--border);overflow:hidden}

.inv-head{padding:1.5rem 2rem;border-bottom:1px solid var(--divider);display:grid;grid-template-columns:1fr auto;gap:1.5rem;align-items:start}
.fg{display:flex;flex-direction:column;gap:.25rem}
.fl{font-size:var(--text-xs);font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.fi{font-size:1rem;font-weight:500;background:transparent;border:none;outline:none;padding:0;border-bottom:1.5px solid var(--divider);padding-bottom:.25rem;transition:border-color var(--t);width:100%}
.fi:focus{border-bottom-color:var(--p)}
.fi::placeholder{color:var(--faint);font-weight:400}
.dg{text-align:right;min-width:160px}
.dg .fi{text-align:right}

.tw{overflow-x:auto}
table{table-layout:fixed}
colgroup col:nth-child(1){width:14%}
colgroup col:nth-child(2){width:9%}
colgroup col:nth-child(3){width:10%}
colgroup col:nth-child(4){width:10%}
colgroup col:nth-child(5){width:10%}
colgroup col:nth-child(6){width:12%}
colgroup col:nth-child(7){width:14%}
colgroup col:nth-child(8){width:5%}

thead tr{background:var(--surface-2);border-bottom:2px solid var(--p)}
th{padding:.75rem;font-size:var(--text-xs);font-weight:700;color:var(--p);text-transform:uppercase;letter-spacing:.07em;text-align:center;white-space:nowrap}
th:first-child{text-align:left;padding-left:2rem}

tbody tr{border-bottom:1px solid var(--divider);transition:background var(--t)}
tbody tr:nth-child(even){background:var(--row-alt)}
tbody tr:hover{background:var(--row-hover)}

tfoot tr{background:var(--hl)!important;border-top:2px solid var(--p)}
tfoot td{padding:.75rem;font-size:var(--text-sm);font-weight:700;color:var(--pa);text-align:center}
tfoot td:first-child{text-align:left;padding-left:2rem;font-size:var(--text-xs);font-weight:800;letter-spacing:.06em}
.tot-sub{font-size:1rem;font-weight:800}

td{padding:0;text-align:center}
td:first-child{text-align:left}
.ci{width:100%;height:40px;padding:.5rem .75rem;font-family:var(--font);font-size:var(--text-sm);color:var(--text);background:transparent;border:none;outline:none;text-align:center;transition:background var(--t),box-shadow var(--t)}
.ci:focus{background:var(--focus-bg);box-shadow:inset 0 0 0 2px var(--p);border-radius:var(--r-sm);position:relative;z-index:1}
.ci.l{text-align:left;padding-left:2rem}
.ci.ro{font-weight:600;color:var(--p);cursor:default;pointer-events:none}
.ci.sub{color:var(--p);font-weight:700}
.ci::placeholder{color:var(--faint)}

.del{width:28px;height:28px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;color:var(--faint);transition:color var(--t),background var(--t);margin:auto}
.del:hover{color:var(--err);background:rgba(161,44,123,.08)}
.del svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.actions{padding:1.25rem 2rem;border-top:1px solid var(--divider);display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.btn-add{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1.25rem;background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:var(--r-full);font-size:var(--text-sm);font-weight:500;transition:background var(--t),border-color var(--t),box-shadow var(--t)}
.btn-add:hover{background:var(--hl);border-color:var(--p);color:var(--p)}
.btn-add .plus{font-size:1.1em;font-weight:700;line-height:1}
.rcnt{font-size:var(--text-xs);color:var(--muted);margin-left:auto;margin-right:1rem}
.btn-pdf{display:inline-flex;align-items:center;gap:.5rem;padding:.5rem 1.5rem;background:var(--p);color:#fff;border-radius:var(--r-full);font-size:var(--text-sm);font-weight:600;box-shadow:var(--sh-sm);transition:background var(--t),transform var(--t)}
.btn-pdf:hover{background:var(--ph);transform:translateY(-1px)}
.btn-pdf:active{background:var(--pa);transform:translateY(0)}
.btn-pdf svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

.empty td{text-align:center;padding:2.5rem;color:var(--faint);font-size:var(--text-sm)}

.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--p);color:#fff;padding:.75rem 1.25rem;border-radius:var(--r-lg);font-size:var(--text-sm);font-weight:500;box-shadow:var(--sh-md);z-index:999;transform:translateY(20px);opacity:0;transition:transform .3s cubic-bezier(.16,1,.3,1),opacity .3s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}

@media(max-width:768px){
  .app{padding:1rem .75rem}
  .inv-head{grid-template-columns:1fr}
  .dg{text-align:left}.dg .fi{text-align:left}
  .actions{flex-direction:column;align-items:stretch}
  .btn-pdf,.btn-add{justify-content:center}
  .rcnt{margin:0;text-align:center}
}
@media print{
  body{background:#fff}.app{padding:0;max-width:100%}
  .topbar,.actions{display:none}
  .card{box-shadow:none;border:1px solid #ddd}
  .del{display:none}
  td:last-child,th:last-child{display:none}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      </div>
      <span class="logo-text">Factura<span>Pro</span></span>
    </div>
  </div>

  <div class="card">
    <div class="inv-head">
      <div class="fg">
        <label class="fl" for="cliente">Empresa / Cliente</label>
        <input class="fi" id="cliente" type="text" placeholder="Nombre del cliente o empresa" autocomplete="off">
      </div>
      <div class="fg dg">
        <label class="fl" for="fecha">Fecha de factura</label>
        <input class="fi" id="fecha" type="date">
      </div>
    </div>

    <div class="tw">
      <table>
        <colgroup><col><col><col><col><col><col><col><col></colgroup>
        <thead>
          <tr>
            <th>CÓDIGO</th><th>TALLA</th><th>UNIDAD</th><th>CAJA</th>
            <th>CANTIDAD</th><th>PRECIO</th><th>SUBTOTAL</th><th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
        <tfoot id="tfoot"></tfoot>
      </table>
    </div>

    <div class="actions">
      <button class="btn-add" onclick="addRow()"><span class="plus">+</span> Añadir línea</button>
      <span class="rcnt" id="rcnt">0 líneas</span>
      <button class="btn-pdf" onclick="exportPDF()">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Exportar PDF
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let rows = [], rc = 0;
document.getElementById('fecha').valueAsDate = new Date();
addRow();

function addRow() {
  const id = ++rc;
  rows.push({id, codigo:'', talla:'', unidad:'', caja:'', cantidad:0, precio:'', subtotal:0});
  render();
  setTimeout(() => { const el = document.querySelector(`[data-id="${id}"][data-f="codigo"]`); if(el) el.focus(); }, 20);
}

function deleteRow(id) { rows = rows.filter(r => r.id !== id); render(); }

function calc(r) {
  r.cantidad = (parseFloat(r.unidad)||0) * (parseFloat(r.caja)||0);
  r.subtotal = r.cantidad * (parseFloat(r.precio)||0);
}

function tots() {
  return rows.reduce((a,r) => ({caja: a.caja+(parseFloat(r.caja)||0), sub: a.sub+(r.subtotal||0)}), {caja:0, sub:0});
}

function render() {
  const tb = document.getElementById('tbody');
  const tf = document.getElementById('tfoot');
  if (!rows.length) {
    tb.innerHTML = '<tr class="empty"><td colspan="8">Sin líneas — pulsa + para añadir un producto</td></tr>';
  } else {
    tb.innerHTML = rows.map(r => `
    <tr>
      <td><input class="ci l" data-id="${r.id}" data-f="codigo" value="${x(r.codigo)}" placeholder="Código…" autocomplete="off" spellcheck="false"></td>
      <td><input class="ci"   data-id="${r.id}" data-f="talla"  value="${x(r.talla)}"  placeholder="—" autocomplete="off"></td>
      <td><input class="ci"   data-id="${r.id}" data-f="unidad" value="${x(r.unidad)}" placeholder="0" type="number" min="0" step="1"></td>
      <td><input class="ci"   data-id="${r.id}" data-f="caja"   value="${x(r.caja)}"   placeholder="0" type="number" min="0" step="1"></td>
      <td><input class="ci ro" tabindex="-1" value="${r.cantidad>0?n(r.cantidad):''}" readonly></td>
      <td><input class="ci"   data-id="${r.id}" data-f="precio" value="${x(r.precio)}" placeholder="0.00" type="number" min="0" step="0.01"></td>
      <td><input class="ci sub ro" tabindex="-1" value="${r.subtotal>0?eu(r.subtotal):''}" readonly></td>
      <td><button class="del" onclick="deleteRow(${r.id})" title="Eliminar">
        <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button></td>
    </tr>`).join('');
  }
  const t = tots();
  tf.innerHTML = `<tr>
    <td>EUROTRAN</td><td></td><td></td>
    <td>${t.caja>0?n(t.caja):''}</td><td></td><td></td>
    <td class="tot-sub">${t.sub>0?eu(t.sub):'—'}</td><td></td>
  </tr>`;
  document.getElementById('rcnt').textContent = rows.length===1?'1 línea':`${rows.length} líneas`;
  bindCells();
}

function bindCells() {
  document.querySelectorAll('.ci[data-id]').forEach(inp => {
    inp.addEventListener('input', onInput);
    inp.addEventListener('keydown', onKey);
    inp.addEventListener('focus', e => e.target.select && e.target.select());
  });
}

function onInput(e) {
  const id=+e.target.dataset.id, f=e.target.dataset.f;
  const r=rows.find(r=>r.id===id); if(!r) return;
  r[f]=e.target.value; calc(r);
  const tr=e.target.closest('tr');
  const ros=tr.querySelectorAll('.ro');
  ros[0].value=r.cantidad>0?n(r.cantidad):'';
  ros[1].value=r.subtotal>0?eu(r.subtotal):'';
  const t=tots();
  const tds=document.getElementById('tfoot').querySelectorAll('td');
  if(tds.length>=7){tds[3].textContent=t.caja>0?n(t.caja):'';tds[6].textContent=t.sub>0?eu(t.sub):'—';}
}

function onKey(e) {
  if(e.key!=='Enter') return; e.preventDefault();
  const all=[...document.querySelectorAll('.ci[data-id]')];
  const i=all.indexOf(e.target);
  if(i>=0&&i<all.length-1){all[i+1].focus();all[i+1].select&&all[i+1].select();}
  else addRow();
}

const n  = v => Number(v).toLocaleString('es-ES',{maximumFractionDigits:2});
const eu = v => Number(v).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+' €';
function x(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function exportPDF() {
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'landscape',unit:'mm',format:'a4'});
  const W=297,H=210;
  const cliente=document.getElementById('cliente').value||'Cliente';
  const fecha=document.getElementById('fecha').value||new Date().toISOString().slice(0,10);
  const fd=fecha.split('-').reverse().join('/');

  doc.setFillColor(1,105,111);
  doc.rect(0,0,W,18,'F');
  doc.setTextColor(255,255,255);
  doc.setFont('helvetica','bold');doc.setFontSize(13);
  doc.text('FACTURA',14,11);
  doc.setFont('helvetica','normal');doc.setFontSize(9);
  doc.text('Cliente: '+cliente,14,16.5);
  doc.text('Fecha: '+fd,W-14,11,{align:'right'});

  const t=tots();
  const body=rows.map(r=>[
    r.codigo||'',r.talla||'',
    r.unidad!==''?n(r.unidad):'',
    r.caja!==''?n(r.caja):'',
    r.cantidad>0?n(r.cantidad):'',
    r.precio!==''?n(r.precio)+' €':'',
    r.subtotal>0?eu(r.subtotal):''
  ]);
  body.push(['EUROTRAN','','',t.caja>0?n(t.caja):'','','',t.sub>0?eu(t.sub):'']);

  doc.autoTable({
    head:[['CÓDIGO','TALLA','UNIDAD','CAJA','CANTIDAD','PRECIO','SUBTOTAL']],
    body,startY:22,theme:'grid',
    headStyles:{fillColor:[1,105,111],textColor:255,fontStyle:'bold',halign:'center',fontSize:8.5},
    bodyStyles:{fontSize:8.5,halign:'center',textColor:[40,37,29]},
    columnStyles:{0:{halign:'left',cellWidth:42},1:{cellWidth:20},2:{cellWidth:24},3:{cellWidth:24},4:{cellWidth:26},5:{cellWidth:28},6:{cellWidth:36}},
    alternateRowStyles:{fillColor:[249,248,245]},
    didDrawCell(data){
      if(data.section==='body'&&data.row.index===body.length-1){
        doc.setFillColor(206,220,216);
        doc.rect(data.cell.x,data.cell.y,data.cell.width,data.cell.height,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(8.5);doc.setTextColor(15,54,56);
        const a=data.column.index===0?'left':'center';
        const px=data.column.index===0?data.cell.x+2:data.cell.x+data.cell.width/2;
        doc.text(String(data.cell.raw||''),px,data.cell.y+data.cell.height/2+1.2,{align:a});
      }
    },
    margin:{left:14,right:14},rowPageBreak:'avoid'
  });

  doc.setTextColor(170,170,170);doc.setFont('helvetica','normal');doc.setFontSize(7.5);
  doc.text('Generado el '+new Date().toLocaleDateString('es-ES'),14,H-5);
  doc.text(String(doc.internal.getNumberOfPages())+' pág.',W-14,H-5,{align:'right'});
  doc.save('factura_'+cliente.replace(/[^a-z0-9]/gi,'_')+'_'+fecha+'.pdf');
  showToast('✓ PDF exportado correctamente');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
</script>
</body>
</html>
